<!DOCTYPE html>
<html lang="ur">
<head>
    <script async src="https://googlesyndication.com" crossorigin="anonymous"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqsa's AI Bot</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #7474bf, #348ac7);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chat-container {
            width: 100%;
            max-width: 400px;
            height: 600px;
            background: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .chat-header {
            background: linear-gradient(135deg, #075e54, #128c7e);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
        .chat-messages {
            flex: 1;
            padding: 20px;
            background: #efeae2;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user-message {
            background: #dcf8c6;
            align-self: flex-end;
            border-top-right-radius: 0;
        }
        .bot-message {
            background: white;
            align-self: flex-start;
            border-top-left-radius: 0;
        }
        .input-container {
            padding: 10px;
            background: #f0f0f0;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }
        button {
            background: linear-gradient(135deg, #075e54 0%, #128c7e 100%);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">Aqsa's AI Bot</div>
        <div class="chat-messages" id="chat-box">
            <div class="message bot-message">Hello! Main aap ka AI assistant hoon. Aap mujh se kuch bhi pooch sakte hain.</div>
        </div>
        <div class="input-container">
            <input type="text" id="user-input" placeholder="Yahan type karen..." onkeypress="handleKeyPress(event)">
            <!-- Button ke andar icon lagaya taaki click sahi se ho sake -->
            <button id="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

<script>
   const GEMINI_API_KEY = "AIzaSy..."AQ.Ab8RN6LhrmsCqL1C-MveJ8TmL5jud6boguWgaxrchk6fuUJF4g"
 

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const messageText = inputField.value.trim();
        if (!messageText) return;

        appendMessage(messageText, 'user-message');
        inputField.value = '';

        const chatBox = document.getElementById('chat-box');
        const loadingDiv = document.createElement('div');
        loadingDiv.className = "message bot-message";
        loadingDiv.innerText = "Soch raha hoon...";
        chatBox.appendChild(loadingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch('https://openai.com', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${OPENAI_API_KEY}`
                },
                body: JSON.stringify({
                    model: 'gpt-3.5-turbo',
                    messages: [{ role: 'user', content: messageText }]
                })
            });

            const data = await response.json();
            chatBox.removeChild(loadingDiv);

            // Sahi response data format lagaya gya hai
            if (data.choices && data.choices[0] && data.choices[0].message) {
                appendMessage(data.choices[0].message.content, 'bot-message');
            } else {
                appendMessage('Maafi chahta hoon, kuch galti hui hai.', 'bot-message');
            }

        } catch (error) {
            if (chatBox.contains(loadingDiv)) {
                chatBox.removeChild(loadingDiv);
            }
            appendMessage('Net ka masla hai ya key block ho gayi hai.', 'bot-message');
        }
    }

    function appendMessage(text, className) {
        const chatBox = document.getElementById('chat-box');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${className}`;
        messageDiv.innerText = text;
        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

     crossorigin="anonymous"></script>
</body>
