 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqsa's AI Bot</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 10px; pointer-events: auto; position: relative;
        }
        .chat-container {
            width: 100%; max-width: 450px; background: white;
            border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden; display: flex; flex-direction: column;
            height: 85vh; pointer-events: auto; z-index: 9999;
        }
        .chat-header {
            background: #075e54; color: white; padding: 15px;
            text-align: center; font-size: 20px; font-weight: bold;
        }
        .chat-messages {
            flex: 1; padding: 15px; overflow-y: auto;
            background: #e5ddd5; display: flex; flex-direction: column; gap: 10px;
        }
        .message {
            max-width: 75%; padding: 10px 15px; border-radius: 15px;
            font-size: 16px; line-height: 1.4; word-wrap: break-word;
        }
        .user-message {
            background: #dcf8c6; align-self: flex-end;
            border-top-right-radius: 0;
        }
        .bot-message {
            background: white; align-self: flex-start;
            border-top-left-radius: 0;
        }
        .input-container {
            padding: 10px; background: #f0f0f0;
            display: flex; gap: 10px; align-items: center;
        }
        input {
            flex: 1; padding: 12px; border: 1px solid #ccc;
            border-radius: 25px; font-size: 16px; outline: none;
        }
        button {
            background: linear-gradient(135deg, #075e54 0%, #128c7e 100%);
            color: white; border: none; padding: 12px 15px;
            border-radius: 50%; cursor: pointer; font-size: 18px;
            width: 45px; height: 45px; display: flex;
            align-items: center; justify-content: center;
            pointer-events: auto; z-index: 9999;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">Aqsa's AI Bot</div>
        <div class="chat-messages" id="chat-box">
            <div class="message bot-message">Hello! Main aap ka AI assistant hoon. Aap mujh se kuch bhi pooch sakte hain.</div>
        </div>
        <div class="input-container">
            <input type="text" id="user-input" placeholder="Yahan type karen..." onkeypress="handleKeyPress(event)">
            <button id="send-btn" onclick="sendMessage()">➡️</button>
        </div>
    </div>

    <script>
      const OPENAI_API_KEY"nayi-key-yahan-aaye"="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";

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const messageText = inputField.value.trim();
            if (!messageText) return;

            appendMessage(messageText, 'user-message');
            inputField.value = '';

            const chatBox = document.getElementById('chat-box');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message bot-message';
            loadingDiv.innerText = 'Soch raha hoon...';
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('https://openai.com', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${OPENAI_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-3.5-turbo',
                        messages: [{ role: 'user', content: messageText }]
                    })
                });

                const data = await response.json();
                chatBox.removeChild(loadingDiv);

                if (data.choices && data.choices[0]) {
                    appendMessage(data.choices[0].message.content, 'bot-message');
                } else {
                    appendMessage('Maafi chahta hoon, kuch galti hui hai.', 'bot-message');
                }
            } catch (error) {
                chatBox.removeChild(loadingDiv);
                appendMessage('Net ka masla hai ya key block ho gayi hai.', 'bot-message');
            }
        }

        function appendMessage(text, className) {
            const chatBox = document.getElementById('chat-box');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${className}`;
            messageDiv.innerText = text;
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
