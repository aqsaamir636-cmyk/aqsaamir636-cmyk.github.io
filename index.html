<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqsa's AI Bot</title>
    
    <!-- Google AdSense Code -->
    <script async src="https://googlesyndication.com" crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background: linear-gradient(135deg, #7617b4, #1d4ac2); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 400px; height: 600px; background: white; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .chat-header { background: linear-gradient(135deg, #075e54, #128c7e); color: white; padding: 20px; text-align: center; font-size: 20px; font-weight: bold; }
        .chat-messages { flex: 1; padding: 20px; background: #efeae2; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 75%; padding: 10px 15px; border-radius: 15px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .user-message { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 0; }
        .bot-message { background: white; align-self: flex-start; border-top-left-radius: 0; }
        .input-container { padding: 10px; background: #f0f0f0; display: flex; gap: 10px; align-items: center; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; font-size: 16px; outline: none; }
        button { background: linear-gradient(135deg, #075e54, #128c7e); color: white; border: none; border-radius: 50%; cursor: pointer; font-size: 18px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">Aqsa's AI Bot</div>
        <div class="chat-messages" id="chat-box">
            <div class="message bot-message">Hello! Main aap ka AI assistant hoon. Aap mujh se kuch bhi pooch sakte hain.</div>
        </div>
        <div class="input-container">
            <input type="text" id="user-input" placeholder="Yahan type karen..." onkeypress="handleKeyPress(event)">
            <button id="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        // آپ کی مفت چابی یہاں بالکل درست فٹ ہے
        const GEMINI_API_KEY = "AIzaSyAQ_AbRN6LhrmsCqL1C-MveJ0TmLsjud6ooguAgaxrchk6TuJJF4g";

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const inputField = document.getElementById("user-input");
            const chatBox = document.getElementById("chat-box");
            const messageText = inputField.value.trim();

            if (messageText === "") return;

            chatBox.innerHTML += `<div class="message user-message">${messageText}</div>`;
            inputField.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            const botMessageId = "bot-" + Date.now();
            chatBox.innerHTML += `<div class="message bot-message" id="${botMessageId}">...</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(`https://googleapis.com{GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: messageText }] }]
                    })
                });

                const data = await response.json();
                const botResponse = data.candidates[0].content.parts[0].text;
                document.getElementById(botMessageId).innerText = botResponse;

            } catch (error) {
                document.getElementById(botMessageId).innerText = "Net ka masla hai ya key block ho gayi hai.";
                console.error(error);
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
