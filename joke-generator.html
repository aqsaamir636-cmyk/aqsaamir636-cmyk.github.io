<!DOCTYPE html>
<html lang="ur">
<head><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7245570041904050"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator - خنداک بٹ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
        }
        
        .container { 
            background: white; 
            width: 100%;
            max-width: 500px; 
            border-radius: 20px; 
            padding: 40px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        h1 {
            color: #075e54;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .joke-box { 
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            padding: 25px;
            border-radius: 15px;
            margin: 20px 0;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .joke-text {
            font-size: 18px;
            color: #333;
            line-height: 1.6;
            direction: rtl;
        }

        .joke-setup {
            font-weight: bold;
            margin-bottom: 10px;
            color: #075e54;
        }

        .joke-delivery {
            margin-top: 10px;
            color: #555;
            font-style: italic;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        button { 
            flex: 1;
            min-width: 150px;
            background: linear-gradient(135deg, #075e54 0%, #128c7e 100%);
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 25px; 
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(7, 94, 84, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #075e54;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
        }

        .category-select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            margin: 15px 0;
            direction: rtl;
        }

        .category-select:focus {
            outline: none;
            border-color: #075e54;
            box-shadow: 0 0 5px rgba(7, 94, 84, 0.3);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            font-size: 14px;
            color: #666;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #075e54;
        }

        .stat-label {
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>😂 خنداک بٹ</h1>
    <p class="subtitle">Random Joke Generator - تمہاری ہنسی کے لیے!</p>
    
    <div class="stats">
        <div class="stat-item">
            <div class="stat-number" id="jokeCount">0</div>
            <div class="stat-label">جوک دیکھے</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="favoriteCount">0</div>
            <div class="stat-label">پسندیدہ</div>
        </div>
    </div>

    <select class="category-select" id="categorySelect">
        <option value="">براہ کرم زمرہ منتخب کریں</option>
        <option value="general">عام (General)</option>
        <option value="programming">پروگرامنگ</option>
        <option value="knock-knock">Knock Knock</option>
    </select>

    <div id="jokeContainer" class="joke-box" style="display:none;">
        <div class="joke-text" id="jokeText">جوک یہاں دکھایا جائے گا...</div>
    </div>

    <div id="messageContainer"></div>

    <div class="button-group">
        <button onclick="getJoke()">🎲 نیا جوک حاصل کریں</button>
        <button onclick="addToFavorites()">❤️ پسندیدہ میں ڈالیں</button>
        <button onclick="shareJoke()">📤 شیئر کریں</button>
    </div>

    <button style="margin-top: 15px; width: 100%; background: linear-gradient(135deg, #9c27b0 0%, #673ab7 100%);" onclick="viewFavorites()">
        ⭐ میرے پسندیدہ جوک دیکھیں
    </button>
</div>

<script>
    let currentJoke = null;
    let jokeCount = localStorage.getItem('jokeCount') || 0;
    let favorites = JSON.parse(localStorage.getItem('favorites')) || [];

    // صفحہ لوڈ ہونے پر stats اپڈیٹ کریں
    window.addEventListener('load', () => {
        document.getElementById('jokeCount').innerText = jokeCount;
        document.getElementById('favoriteCount').innerText = favorites.length;
    });

    async function getJoke() {
        const button = event.target;
        const category = document.getElementById('categorySelect').value || 'general';
        
        button.disabled = true;
        button.innerHTML = '<span class="loading"></span> حاصل کر رہے ہیں...';
        
        const messageContainer = document.getElementById('messageContainer');
        messageContainer.innerHTML = '';
        
        try {
            // JokeAPI سے جوک حاصل کریں
            const response = await fetch(`https://v2.jokeapi.dev/joke/${category}?lang=ur`);
            
            if (!response.ok) {
                throw new Error('جوک حاصل نہیں ہو سکا');
            }
            
            const data = await response.json();
            
            if (data.error) {
                throw new Error('API میں خرابی');
            }
            
            currentJoke = data;
            displayJoke(data);
            
            // شمار میں اضافہ کریں
            jokeCount++;
            localStorage.setItem('jokeCount', jokeCount);
            document.getElementById('jokeCount').innerText = jokeCount;
            
            messageContainer.innerHTML = '<div class="success">✅ جوک لوڈ ہو گیا!</div>';
            
        } catch (error) {
            console.error('Error:', error);
            messageContainer.innerHTML = `<div class="error">❌ خرابی: ${error.message}</div>`;
        } finally {
            button.disabled = false;
            button.innerHTML = '🎲 نیا جوک حاصل کریں';
        }
    }

    function displayJoke(joke) {
        const jokeContainer = document.getElementById('jokeContainer');
        const jokeText = document.getElementById('jokeText');
        
        let jokeHTML = '';
        
        if (joke.type === 'single') {
            jokeHTML = `<div class="joke-text">${joke.joke}</div>`;
        } else if (joke.type === 'twopart') {
            jokeHTML = `
                <div>
                    <div class="joke-setup">${joke.setup}</div>
                    <div class="joke-delivery">${joke.delivery}</div>
                </div>
            `;
        }
        
        jokeText.innerHTML = jokeHTML;
        jokeContainer.style.display = 'flex';
    }

    function addToFavorites() {
        if (!currentJoke) {
            document.getElementById('messageContainer').innerHTML = 
                '<div class="error">❌ پہلے کوئی جوک حاصل کریں</div>';
            return;
        }
        
        // چیک کریں کہ پہلے سے موجود نہیں ہے
        const exists = favorites.some(fav => 
            (fav.joke === currentJoke.joke) || 
            (fav.setup === currentJoke.setup)
        );
        
        if (!exists) {
            favorites.push(currentJoke);
            localStorage.setItem('favorites', JSON.stringify(favorites));
            document.getElementById('favoriteCount').innerText = favorites.length;
            document.getElementById('messageContainer').innerHTML = 
                '<div class="success">❤️ جوک پسندیدہ میں ڈال دیا گیا!</div>';
        } else {
            document.getElementById('messageContainer').innerHTML = 
                '<div class="error">⚠️ یہ جوک پہلے سے پسندیدہ میں ہے</div>';
        }
    }

    function shareJoke() {
        if (!currentJoke) {
            document.getElementById('messageContainer').innerHTML = 
                '<div class="error">❌ پہلے کوئی جوک حاصل کریں</div>';
            return;
        }
        
        let jokeText = '';
        if (currentJoke.type === 'single') {
            jokeText = currentJoke.joke;
        } else {
            jokeText = `${currentJoke.setup}\n${currentJoke.delivery}`;
        }
        
        const text = `😂 خنداک بٹ سے:\n\n${jokeText}\n\nhttps://aqsaamir636-cmyk.github.io/My-aibot/joke-generator.html`;
        
        if (navigator.share) {
            navigator.share({
                title: '😂 خنداک بٹ - جوک',
                text: text
            }).catch(err => console.log('Share error:', err));
        } else {
            // Fallback - کاپی کریں
            navigator.clipboard.writeText(text);
            document.getElementById('messageContainer').innerHTML = 
                '<div class="success">📋 جوک کلپ بورڈ میں کاپی ہو گیا!</div>';
        }
    }

    function viewFavorites() {
        if (favorites.length === 0) {
            alert('آپ کے پسندیدہ جوک ابھی موجود نہیں ہیں!');
            return;
        }
        
        let favoritesText = 'آپ کے پسندیدہ جوک:\n\n';
        favorites.forEach((joke, index) => {
            if (joke.type === 'single') {
                favoritesText += `${index + 1}. ${joke.joke}\n\n`;
            } else {
                favoritesText += `${index + 1}. ${joke.setup}\n   ${joke.delivery}\n\n`;
            }
        });
        
        alert(favoritesText);
    }

    // صفحہ لوڈ ہوتے ہی ایک جوک حاصل کریں
    window.addEventListener('load', () => {
        setTimeout(() => getJoke(), 500);
    });
</script>

</body>
</html>
